on:
  push:
    branches:
      - main

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4
        
      - name: Set Up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Build WAR File
        run: mvn clean package -DskipTests

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build App Image
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/vprofileapp:latest ./Docker-files/app

      - name: Build Web Image
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/vprofileweb:latest ./Docker-files/web

      - name: Build DB Image
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/vprofiledb:latest ./Docker-files/db

      - name: Push App Image
        run: docker push ${{ secrets.DOCKER_USERNAME }}/vprofileapp:latest

      - name: Push Web Image
        run: docker push ${{ secrets.DOCKER_USERNAME }}/vprofileweb:latest

      - name: Push DB Image
        run: docker push ${{ secrets.DOCKER_USERNAME }}/vprofiledb:latest

  deploy:

    needs: build-and-push

    runs-on: ubuntu-latest

    steps:

      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |

            cd /home/ec2-user/vprofile

            docker compose down

            docker pull ${{ secrets.DOCKER_USERNAME }}/vprofileapp:latest
            docker pull ${{ secrets.DOCKER_USERNAME }}/vprofileweb:latest
            docker pull ${{ secrets.DOCKER_USERNAME }}/vprofiledb:latest

            docker compose up -d

            
            docker ps